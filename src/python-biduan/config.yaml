# ============================================================
# 缠论分析模块配置文件
# ============================================================
# 版本: v1.0
# 最后更新: 2026-03-22
# ============================================================

# ============================================================
# 数据源配置
# ============================================================
data:
  # 股票数据根目录
  base_dir: "H:/股票信息/股票数据库/daban/股票数据"

  # 股票代码清单配置
  watchlist:
    dir: "H:/股票信息/监控清单"
    file: "target_list.xlsx"
    code_column: "股票代码"  # 股票代码列名

# ============================================================
# 文件命名规则配置
# ============================================================
naming:
  # 文件命名规则
  files:
    # K线数据文件命名
    kline:
      # 文件命名模式: {symbol}_{period}.xlsx
      pattern: "{symbol}_{period}"
      extension: ".xlsx"
      # 周期映射
      period_map:
        daily: "d"        # 日线
        min30: "30"       # 30分钟线
        min5: "5"         # 5分钟线

    # 分析报告文件命名
    analysis:
      # HTML图表命名: {symbol}_{period}_analysis.html
      html_pattern: "{symbol}_{period}_analysis"
      html_extension: ".html"
      # Excel报告命名: {symbol}_{period}_analysis.xlsx
      excel_pattern: "{symbol}_{period}_analysis"
      excel_extension: ".xlsx"

# ============================================================
# 分析配置
# ============================================================
analysis:
  # 数据周期列表
  data_types:
    - "d"      # 日线
    - "30"     # 30分钟线
    - "5"      # 5分钟线

  # 最大加载记录数
  max_records: 500

  # 最小分析数据量
  min_klines: 30

  # 分析股票数量限制 (0=不限制)
  stock_limit: 1

  # ============================================================
  # 技术指标配置
  # ============================================================
  
  # RSI 配置
  rsi:
    period: 6  # 默认周期，与 target_list.xlsx 中的 RSI_6 对应
  
  # 成交量均线配置
  volume_ma:
    periods: [10, 20]  # 可配置多个周期
  
  # 筹码分布配置
  chip_distribution:
    default_lookback: 1  # 默认回看周期数
    max_lookback: 100  # 最大回看周期数
    price_bins: 50  # 价格区间数量
    periods: [1, 5, 10]  # 默认计算的回看周期列表

# ============================================================
# 输出配置
# ============================================================
output:
  # 图表配置
  chart:
    width: "1400px"
    height: "900px"
  
  # 筹码分布输出配置
  chip_distribution:
    dir: "chip"  # 子目录名称
    formats: ["xlsx"]  # 支持的导出格式
